name: build-ios

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node (if needed)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd iosApp
          xcodegen generate

      - name: Build iOS (no signing)
        run: |
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Find .app and prepare IPA
        run: |
          set -e

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*Release-iphoneos*" -not -path "*.appex*" | head -n 1)

          echo "Found app: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ios-app.ipa Payload

          echo "IPA created at: $(pwd)/ios-app.ipa"
          ls -lh ios-app.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios-app.ipa   # root repo, bukan iosApp/ios-app.ipa
          if-no-files-found: error
