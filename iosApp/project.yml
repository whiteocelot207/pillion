name: iosApp
options:
  bundleIdPrefix: app.pillion
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    dependencies:
      - target: PillionBroadcast
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pillion.dev
        INFOPLIST_FILE: iosApp/Info.plist
        # Gradle's build phase writes outside DerivedData, so the sandbox must be off (Xcode 15+).
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        # Find + link the static Kotlin/Native framework produced by the build phase below.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
    preBuildScripts:
      - name: "Compile Kotlin/Native framework"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          export JAVA_HOME="${JAVA_HOME:-$(/usr/libexec/java_home 2>/dev/null)}"
          cd "$SRCROOT/.."
          # Build the static framework for the right K/N target, then copy it where Xcode links it.
          # (Explicit copy instead of embedAndSignAppleFrameworkForXcode, which silently skips when
          # Xcode's env doesn't match its expectations.)
          CONFIG_LC=$(echo "$CONFIGURATION" | tr '[:upper:]' '[:lower:]')
          CONFIG_CAP=$(echo "$CONFIG_LC" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')
          if [ "$PLATFORM_NAME" = "iphonesimulator" ]; then
            KN_TARGET="IosSimulatorArm64"; BIN_DIR="iosSimulatorArm64"
          else
            KN_TARGET="IosArm64"; BIN_DIR="iosArm64"
          fi
          ./gradlew ":composeApp:link${CONFIG_CAP}Framework${KN_TARGET}"
          DEST="composeApp/build/xcode-frameworks/${CONFIGURATION}/${SDK_NAME}"
          mkdir -p "$DEST"
          rm -rf "$DEST/ComposeApp.framework"
          cp -R "composeApp/build/bin/${BIN_DIR}/${CONFIG_LC}Framework/ComposeApp.framework" "$DEST/"
    postCompileScripts:
      - name: "Sync Compose resources into app bundle"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          export JAVA_HOME="${JAVA_HOME:-$(/usr/libexec/java_home 2>/dev/null)}"
          cd "$SRCROOT/.."
          # embedAndSignAppleFrameworkForXcode normally copies these; since we link the framework
          # ourselves, sync the Compose resources too. The runtime reads from
          # <bundle>/compose-resources/composeResources/<package>/... (CMP 1.7).
          if [ "$PLATFORM_NAME" = "iphonesimulator" ]; then KN_TARGET="IosSimulatorArm64"; else KN_TARGET="IosArm64"; fi
          ./gradlew ":composeApp:assemble${KN_TARGET}MainResources"
          KN_LC=$(echo "$KN_TARGET" | awk '{print tolower(substr($0,1,1)) substr($0,2)}')
          SRC=$(find composeApp/build -type d -path "*aggregated-resources/${KN_LC}/composeResources" | head -1)
          DEST="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/compose-resources"
          if [ -n "$SRC" ]; then
            mkdir -p "$DEST"
            rm -rf "$DEST/composeResources"
            cp -R "$SRC" "$DEST/"
            echo "synced Compose resources -> $DEST"
          else
            echo "warning: composeResources dir not found for $KN_LC" >&2
          fi

  PillionBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - path: Extension
      - path: Shared
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pillion.dev.broadcast
        INFOPLIST_FILE: Extension/Info.plist
